services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sparapan}:${POSTGRES_PASSWORD:-sparapan}@postgres:5432/${POSTGRES_DB:-sparapan}
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      # Vazio por padrão: com trustHost, o Auth.js infere a URL da própria
      # requisição (funciona por IP ou domínio). Defina no .env com a URL
      # pública — é obrigatório para links de portal/assinatura e Mercado Pago.
      AUTH_URL: ${AUTH_URL:-}
      # Usadas só por `npm run db:seed` (cria o usuário admin inicial).
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-naosresponda@sparapan.com.br}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOADS_DIR: /app/data/uploads
      GOTENBERG_URL: http://gotenberg:3000
      MAP_STYLE_URL: ${MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sparapan

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sparapan}:${POSTGRES_PASSWORD:-sparapan}@postgres:5432/${POSTGRES_DB:-sparapan}
      REDIS_URL: redis://redis:6379
      MAIL_PROVIDER: ${MAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-naosresponda@sparapan.com.br}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOADS_DIR: /app/data/uploads
      GOTENBERG_URL: http://gotenberg:3000
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sparapan

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sparapan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sparapan}
      POSTGRES_DB: ${POSTGRES_DB:-sparapan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sparapan}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sparapan

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - sparapan

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    networks:
      - sparapan

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    profiles: ["dev"]
    volumes:
      - mailpit_data:/data
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db
    networks:
      - sparapan

networks:
  sparapan:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  mailpit_data:
